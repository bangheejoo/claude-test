<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>명언 모음</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f5f2eb;
      font-family: 'Noto Serif KR', 'Georgia', serif;
      color: #2c2825;
      padding: 2rem;
    }

    h1 {
      font-size: 0.85rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: #9a8a6e;
      margin-bottom: 2.5rem;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
    }

    .quote-card {
      max-width: 720px;
      width: 100%;
      background: #fff;
      border: none;
      border-radius: 4px;
      padding: 3rem 3.5rem;
      position: relative;
      box-shadow: 0 2px 24px rgba(0, 0, 0, 0.07), 0 1px 4px rgba(0,0,0,0.05);
      transition: opacity 0.4s ease;
    }

    .quote-card.fade {
      opacity: 0;
    }

    .quote-mark {
      font-size: 7rem;
      line-height: 0;
      color: #c8b99a;
      position: absolute;
      top: 2.8rem;
      left: 2.8rem;
      opacity: 0.5;
      font-family: 'Cormorant Garamond', serif;
    }

    .quote-text {
      font-size: 1.45rem;
      line-height: 1.9;
      margin-bottom: 2rem;
      padding-top: 1rem;
      word-break: keep-all;
      color: #2c2825;
      font-weight: 400;
    }

    .quote-author {
      font-size: 0.95rem;
      color: #9a8a6e;
      font-style: italic;
      text-align: right;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
    }

    .quote-author span {
      display: block;
      font-size: 0.75rem;
      color: #bbb0a0;
      font-style: normal;
      margin-top: 0.2rem;
      font-family: 'Noto Serif KR', serif;
      letter-spacing: 0.03em;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 2rem;
    }

    button {
      background: none;
      border: 1px solid #d4c9b8;
      color: #7a6a55;
      padding: 0.55rem 1.3rem;
      border-radius: 50px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: 'Noto Serif KR', serif;
      transition: all 0.2s;
    }

    button:hover {
      background: #7a6a55;
      border-color: #7a6a55;
      color: #fff;
    }

    #btn-random {
      background: #7a6a55;
      border-color: #7a6a55;
      color: #fff;
      padding: 0.55rem 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #btn-random:hover {
      background: #5e5040;
    }

    #btn-random:active svg {
      animation: spin 0.4s ease;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .counter {
      font-size: 0.78rem;
      color: #c0b5a5;
      margin-left: auto;
      font-family: 'Cormorant Garamond', serif;
      letter-spacing: 0.05em;
    }

    .dots {
      display: flex;
      gap: 6px;
      margin-top: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #d9d0c4;
      cursor: pointer;
      transition: background 0.2s;
    }

    .dot.active {
      background: #7a6a55;
    }

    .mission-card {
      max-width: 720px;
      width: 100%;
      background: #faf7f2;
      border: 1px solid #e8dfd2;
      border-left: 3px solid #c8b99a;
      border-radius: 4px;
      padding: 1.2rem 1.8rem;
      margin-top: 0.8rem;
      display: flex;
      align-items: flex-start;
      gap: 0.9rem;
      transition: opacity 0.4s ease;
    }

    .mission-card.fade {
      opacity: 0;
    }

    .mission-icon {
      font-size: 1.2rem;
      flex-shrink: 0;
      margin-top: 0.15rem;
    }

    .mission-label {
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #9a8a6e;
      margin-bottom: 0.35rem;
      font-family: 'Cormorant Garamond', serif;
    }

    .mission-text {
      font-size: 1rem;
      line-height: 1.7;
      color: #4a3f35;
      word-break: keep-all;
      font-size: 0.95rem;
    }

    .mission-done-wrap {
      margin-left: auto;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    #btn-done {
      border: 1px solid #d4c9b8;
      color: #9a8a6e;
      padding: 0.35rem 0.9rem;
      font-size: 0.78rem;
      border-radius: 50px;
      cursor: pointer;
      background: none;
      transition: all 0.2s;
      white-space: nowrap;
      font-family: 'Noto Serif KR', serif;
    }

    #btn-done:hover {
      border-color: #9a8a6e;
      color: #5e5040;
    }

    #btn-done.done {
      background: #9a8a6e;
      border-color: #9a8a6e;
      color: #fff;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <h1>명언 모음</h1>

  <div class="quote-card" id="card">
    <div class="quote-mark">"</div>
    <p class="quote-text" id="quote-text"></p>
    <div class="quote-author">
      <strong id="quote-author"></strong>
      <span id="quote-info"></span>
    </div>
  </div>

  <div class="mission-card" id="mission-card">
    <div class="mission-icon">🎯</div>
    <div>
      <div class="mission-label">오늘의 미션</div>
      <div class="mission-text" id="mission-text"></div>
    </div>
    <div class="mission-done-wrap">
      <button id="btn-done">완료</button>
    </div>
  </div>

  <div class="dots" id="dots"></div>

  <div class="controls">
    <button id="btn-random" title="무작위 명언">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
    </button>
    <span class="counter" id="counter"></span>
  </div>

  <script>
    const quotes = [
      { text: "인생은 자전거를 타는 것과 같다. 균형을 잡으려면 계속 움직여야 한다.", author: "알베르트 아인슈타인", info: "물리학자 (1879–1955)", mission: "오늘 10분만 밖에 나가 걷거나 스트레칭을 해보세요. 몸을 움직이는 것이 균형의 시작입니다." },
      { text: "성공은 열정을 잃지 않고 실패에서 실패로 나아가는 것이다.", author: "윈스턴 처칠", info: "영국 총리 (1874–1965)", mission: "오늘 실패했거나 미뤄왔던 일 하나를 다시 시도해보세요. 결과보다 시도 자체가 중요합니다." },
      { text: "당신이 할 수 있다고 생각하든, 할 수 없다고 생각하든, 당신이 옳다.", author: "헨리 포드", info: "기업인 (1863–1947)", mission: "오늘 하루, '못 할 것 같다'는 말 대신 '한번 해보자'로 바꿔 말해보세요." },
      { text: "천 리 길도 한 걸음부터 시작된다.", author: "노자", info: "철학자 (기원전 6세기)", mission: "오래 미뤄온 큰 목표를 떠올리고, 그것의 첫 번째 아주 작은 행동 하나만 오늘 실천해보세요." },
      { text: "나는 내일 죽을 것처럼 살고, 영원히 살 것처럼 배운다.", author: "마하트마 간디", info: "인도 독립운동 지도자 (1869–1948)", mission: "오늘 평소 관심 있었지만 배우지 못했던 것을 15분이라도 공부해보세요." },
      { text: "두려움은 앞으로 나아가지 않는 것에서 온다. 앞으로 나아가면 두려움은 사라진다.", author: "베네딕트 쿠퍼버그", info: "작가", mission: "두렵거나 불편해서 피해왔던 연락이나 대화를 오늘 한 번 용기 내어 시작해보세요." },
      { text: "어제는 역사이고, 내일은 미스터리이며, 오늘은 선물이다.", author: "빌 킨", info: "만화가", mission: "스마트폰을 잠시 내려놓고, 지금 이 순간 주변에 있는 사람이나 풍경에 집중해보세요." },
      { text: "우리가 알고 있는 것은 한 방울의 물이요, 모르는 것은 바다다.", author: "아이작 뉴턴", info: "물리학자 (1643–1727)", mission: "오늘 '나는 이미 알고 있다'고 생각했던 주제를 다시 검색하거나 책으로 읽어보세요." },
      { text: "자신을 사랑하는 것이 평생에 걸친 로맨스의 시작이다.", author: "오스카 와일드", info: "작가 (1854–1900)", mission: "오늘 자신에게 칭찬 한 마디를 해주세요. 거울을 보며 소리 내어 말해도 좋습니다." },
      { text: "지금 하지 않으면 언제 할 것인가?", author: "힐렐", info: "유대 현인 (기원전 110–기원전 10)", mission: "'언젠가 해야지'라고 생각해온 일 목록을 적고, 그중 하나를 오늘 당장 시작해보세요." },
      { text: "상상력은 지식보다 중요하다.", author: "알베르트 아인슈타인", info: "물리학자 (1879–1955)", mission: "오늘 자유롭게 낙서하거나, 새로운 아이디어를 종이에 제약 없이 적어보세요." },
      { text: "행복은 목적지가 아니라 여정이다.", author: "랄프 왈도 에머슨", info: "철학자·시인 (1803–1882)", mission: "오늘 결과와 관계없이 그 과정 자체를 즐길 수 있는 일을 하나 선택해서 해보세요." },
      { text: "가장 어두운 밤도 끝나고, 태양은 다시 떠오른다.", author: "빅토르 위고", info: "작가 (1802–1885)", mission: "힘든 시간을 지나고 있는 주변 사람에게 짧은 응원 메시지를 보내보세요." },
      { text: "꿈을 꿀 수 있다면, 이룰 수도 있다.", author: "월트 디즈니", info: "기업인 (1901–1966)", mission: "이루고 싶은 꿈을 구체적으로 적어보고, 그 꿈에 한 발짝 다가가는 행동을 오늘 하나 해보세요." },
      { text: "나 자신을 아는 것이 모든 지혜의 시작이다.", author: "아리스토텔레스", info: "철학자 (기원전 384–322)", mission: "오늘 하루를 마치며 '오늘 나는 어떤 감정을 느꼈는가?'를 일기나 메모로 짧게 기록해보세요." },
    ];

    let current = 0;

    const card = document.getElementById('card');
    const textEl = document.getElementById('quote-text');
    const authorEl = document.getElementById('quote-author');
    const infoEl = document.getElementById('quote-info');
    const counterEl = document.getElementById('counter');
    const dotsEl = document.getElementById('dots');
    const missionCard = document.getElementById('mission-card');
    const missionTextEl = document.getElementById('mission-text');
    const btnDone = document.getElementById('btn-done');

    btnDone.addEventListener('click', () => {
      btnDone.classList.toggle('done');
      btnDone.textContent = btnDone.classList.contains('done') ? '완료 ✓' : '완료';
    });

    function buildDots() {
      dotsEl.innerHTML = '';
      quotes.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'dot' + (i === current ? ' active' : '');
        d.addEventListener('click', () => goTo(i));
        dotsEl.appendChild(d);
      });
    }

    function updateDots() {
      document.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === current);
      });
    }

    function show(index, animate = true) {
      const q = quotes[index];
      if (animate) {
        card.classList.add('fade');
        missionCard.classList.add('fade');
        setTimeout(() => {
          textEl.textContent = q.text;
          authorEl.textContent = '— ' + q.author;
          infoEl.textContent = q.info;
          missionTextEl.textContent = q.mission;
          counterEl.textContent = `${index + 1} / ${quotes.length}`;
          btnDone.classList.remove('done');
          btnDone.textContent = '완료';
          updateDots();
          card.classList.remove('fade');
          missionCard.classList.remove('fade');
        }, 400);
      } else {
        textEl.textContent = q.text;
        authorEl.textContent = '— ' + q.author;
        infoEl.textContent = q.info;
        missionTextEl.textContent = q.mission;
        counterEl.textContent = `${index + 1} / ${quotes.length}`;
        updateDots();
      }
    }

    function goTo(index) {
      current = (index + quotes.length) % quotes.length;
      show(current);
    }

    document.getElementById('btn-random').addEventListener('click', () => {
      let next;
      do { next = Math.floor(Math.random() * quotes.length); } while (next === current);
      goTo(next);
    });

    // 스와이프
    let touchStartX = 0;
    card.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    card.addEventListener('touchend', e => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) goTo(current + (diff > 0 ? 1 : -1));
    }, { passive: true });

    // 마우스 드래그
    let dragStartX = 0;
    let dragging = false;
    card.addEventListener('mousedown', e => { dragStartX = e.clientX; dragging = true; });
    card.addEventListener('mouseup', e => {
      if (!dragging) return;
      dragging = false;
      const diff = dragStartX - e.clientX;
      if (Math.abs(diff) > 40) goTo(current + (diff > 0 ? 1 : -1));
    });
    card.addEventListener('mouseleave', () => { dragging = false; });

    buildDots();
    show(0, false);
  </script>
</body>
</html>
