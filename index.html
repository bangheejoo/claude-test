<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이달의 명언</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f5f2eb;
      font-family: 'Noto Serif KR', 'Georgia', serif;
      color: #2c2825;
      padding: 2rem;
    }

    h1 {
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      color: #9a8a6e;
      margin-bottom: 2.5rem;
      font-family: 'Noto Serif KR', serif;
      font-weight: 600;
    }

    /* ── 명언 카드 ── */
    .quote-card {
      max-width: 720px; width: 100%;
      background: #fff;
      border-radius: 4px;
      padding: 3rem 3.5rem;
      position: relative;
      box-shadow: 0 2px 24px rgba(0,0,0,.07), 0 1px 4px rgba(0,0,0,.05);
      transition: opacity .4s ease;
    }
    .quote-card.fade { opacity: 0; }
    .quote-mark {
      font-size: 7rem; line-height: 0;
      color: #c8b99a; opacity: .5;
      position: absolute; top: 2.8rem; left: 2.8rem;
      font-family: 'Cormorant Garamond', serif;
    }
    .quote-text {
      font-size: 1.45rem; line-height: 1.9;
      margin-bottom: 2rem; padding-top: 1rem;
      word-break: keep-all; color: #2c2825;
    }
    .quote-author {
      font-size: 1.1rem; color: #9a8a6e;
      font-style: italic; text-align: right;
      font-family: 'Cormorant Garamond', serif;
    }
    .quote-author span {
      display: block; font-size: .75rem; color: #bbb0a0;
      font-style: normal; margin-top: .2rem;
      font-family: 'Noto Serif KR', serif; letter-spacing: .03em;
    }

    /* ── 미션 컨테이너 ── */
    .mission-container {
      max-width: 720px; width: 100%;
      margin-top: .8rem;
      transition: opacity .4s ease;
    }
    .mission-container.fade { opacity: 0; }

    .mission-row {
      background: #faf7f2;
      border: 1px solid #e8dfd2;
      border-radius: 4px;
      margin-bottom: .5rem;
      overflow: hidden;
    }
    .mission-row-body {
      display: flex;
      align-items: flex-start;
      gap: .9rem;
      padding: 1rem 1.4rem;
    }
    .mission-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: .15rem; }

    .mission-info { flex: 1; }
    .mission-label-row {
      display: flex; align-items: center;
      gap: .5rem; margin-bottom: .3rem;
    }
    .mission-label {
      font-size: .68rem; letter-spacing: .1em;
      color: #9a8a6e;
      font-family: 'Noto Serif KR', serif;
      font-weight: 600;
    }
    .difficulty-badge {
      font-size: .65rem; padding: .1rem .5rem;
      border-radius: 50px; font-family: 'Noto Serif KR', serif;
      font-weight: 600;
    }
    .diff-easy   { background: #e8f4e8; color: #4a8a4a; }
    .diff-normal { background: #fff0d8; color: #9a6a20; }
    .diff-hard   { background: #fde8e8; color: #a04040; }

    .mission-text {
      font-size: .92rem; line-height: 1.7;
      color: #4a3f35; word-break: keep-all;
    }
    .note-display {
      font-size: .8rem; color: #9a8a6e;
      font-style: italic; margin-top: .35rem;
      line-height: 1.5; display: none;
    }
    .note-display::before { content: '"'; }
    .note-display::after  { content: '"'; }

    .btn-done {
      flex-shrink: 0;
      border: 1px solid #d4c9b8; color: #9a8a6e;
      padding: .3rem .85rem; font-size: .75rem;
      border-radius: 50px; cursor: pointer;
      background: none; transition: all .2s;
      white-space: nowrap; font-family: 'Noto Serif KR', serif;
      align-self: flex-start; margin-top: .1rem;
    }
    .btn-done:hover { border-color: #9a8a6e; color: #5e5040; background: none; }
    .btn-done.done {
      background: #9a8a6e; border-color: #9a8a6e;
      color: #fff; font-weight: 600;
    }
    .btn-done.done:hover { background: #7a6a55; border-color: #7a6a55; color: #fff; }
    .btn-done.done.locked { pointer-events: none; cursor: default; opacity: .9; }

    .btn-select {
      flex-shrink: 0;
      border: 1px solid #9a8a6e; color: #7a6a55;
      padding: .3rem .85rem; font-size: .75rem;
      border-radius: 50px; cursor: pointer;
      background: none; transition: all .2s;
      white-space: nowrap; font-family: 'Noto Serif KR', serif;
      align-self: flex-start; margin-top: .1rem;
    }
    .btn-select:hover { background: #9a8a6e; border-color: #9a8a6e; color: #fff; }
    .btn-cancel {
      flex-shrink: 0;
      border: 1px solid #d4c9b8; color: #bbb0a0;
      padding: .3rem .85rem; font-size: .75rem;
      border-radius: 50px; cursor: pointer;
      background: none; transition: all .2s;
      white-space: nowrap; font-family: 'Noto Serif KR', serif;
    }
    .btn-cancel:hover { border-color: #bbb0a0; color: #7a6a55; }
    .btn-group-col {
      display: flex; flex-direction: column;
      gap: .35rem; align-items: flex-end; flex-shrink: 0;
    }

    /* 느낀점 영역 */
    .note-area {
      max-height: 0; overflow: hidden;
      transition: max-height .35s ease, padding .35s ease;
      padding: 0 1.4rem;
      background: #fdf9f4;
      border-top: 0px solid #e8dfd2;
    }
    .note-area.open {
      max-height: 300px;
      padding: .9rem 1.4rem 1rem;
      border-top-width: 1px;
    }
    .note-input-header {
      font-size: .68rem; letter-spacing: .1em;
      color: #9a8a6e;
      font-family: 'Noto Serif KR', serif;
      font-weight: 600;
      margin-bottom: .4rem;
    }
    .note-textarea {
      width: 100%;
      border: 1px solid #d4c9b8; border-radius: 4px;
      background: #fff; font-size: .88rem;
      color: #4a3f35; font-family: 'Noto Serif KR', serif;
      padding: .55rem .8rem; outline: none;
      resize: none; line-height: 1.6; min-height: 62px;
    }
    .note-textarea::placeholder { color: #c0b5a5; }
    .note-textarea:focus { border-color: #9a8a6e; }
    .note-input-actions {
      display: flex; justify-content: flex-end; margin-top: .5rem;
    }
    .btn-note-save {
      background: #9a8a6e; border: none; color: #fff;
      border-radius: 50px; padding: .32rem 1rem;
      font-size: .76rem; cursor: pointer;
      font-family: 'Noto Serif KR', serif;
    }
    .btn-note-save:hover { background: #7a6a55; color: #fff; border: none; }

    .emoji-picker {
      display: flex; gap: .3rem; flex-wrap: wrap;
      margin-bottom: .55rem;
    }
    .emoji-btn {
      background: none; border: 1.5px solid transparent;
      border-radius: 8px; padding: .2rem .3rem;
      font-size: 1.25rem; cursor: pointer; line-height: 1;
      transition: border-color .15s, background .15s;
    }
    .emoji-btn:hover { border-color: #d4c9b8; background: #faf7f2; }
    .emoji-btn.selected { border-color: #9a8a6e; background: #f5f0e8; }

    /* ── 프로그레스 바 ── */
    .progress-bar-wrap {
      max-width: 720px; width: 100%;
      margin-top: 1rem;
      display: flex; align-items: center; gap: .8rem;
    }
    .progress-bar-track {
      flex: 1; height: 3px;
      background: #e8dfd2; border-radius: 99px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: #9a8a6e;
      border-radius: 99px; transition: width .4s ease;
    }
    .progress-label {
      font-size: .75rem; color: #c0b5a5;
      font-family: 'Noto Serif KR', serif; white-space: nowrap;
    }

    /* ── 컨트롤 ── */
    .controls {
      display: flex; align-items: center;
      gap: 1rem; margin-top: 2rem;
    }
    button {
      background: none; border: 1px solid #d4c9b8;
      color: #7a6a55; padding: .55rem 1.3rem;
      border-radius: 50px; cursor: pointer;
      font-size: .85rem; font-family: 'Noto Serif KR', serif;
      transition: all .2s;
    }
    button:hover { background: #7a6a55; border-color: #7a6a55; color: #fff; }
    #btn-random {
      background: #7a6a55; border-color: #7a6a55;
      color: #fff; padding: .55rem 1.6rem;
    }
    #btn-random:hover { background: #5e5040; }
    #btn-extra {
      background: #7a6a55; border-color: #7a6a55;
      color: #fff; padding: .55rem 1.6rem;
    }
    #btn-extra:hover { background: #5e5040; }

    /* ── 오늘 미션 전체 완료 배너 ── */
    .all-done-banner {
      max-width: 720px; width: 100%;
      margin-top: .8rem;
      background: linear-gradient(135deg, #fdf9f4 0%, #fdf6e3 100%);
      border: 1px solid #e8d8a0;
      border-radius: 8px; padding: 1.4rem 1.8rem;
      text-align: center;
      box-shadow: 0 2px 12px rgba(200,176,100,.12);
    }
    .all-done-emoji { font-size: 2rem; display: block; margin-bottom: .5rem; }
    .all-done-text {
      font-size: .98rem; color: #7a6a55;
      font-family: 'Noto Serif KR', serif;
      font-weight: 600; margin-bottom: .9rem;
      letter-spacing: .02em; line-height: 1.6;
    }
    .all-done-nav {
      display: flex; align-items: center;
      justify-content: center; gap: 1rem;
    }
    .all-done-nav-label {
      font-size: .82rem; color: #9a8a6e;
      font-family: 'Noto Serif KR', serif;
      min-width: 3.2rem; text-align: center;
    }
    #btn-done-prev, #btn-done-next {
      background: none; border: 1px solid #d4c9b8;
      color: #9a8a6e; width: 30px; height: 30px;
      border-radius: 50%; cursor: pointer;
      font-size: 1rem; display: flex;
      align-items: center; justify-content: center; padding: 0;
      font-family: inherit; flex-shrink: 0;
      transition: all .2s;
    }
    #btn-done-prev:hover, #btn-done-next:hover {
      background: #9a8a6e; border-color: #9a8a6e; color: #fff;
    }

    /* ── 나의 기록 버튼 ── */
    #btn-history {
      position: fixed; top: 1.2rem; right: 1.2rem;
      background: #fff; border: 1px solid #e8dfd2;
      border-radius: 50px; padding: .45rem 1rem;
      font-size: .8rem; color: #7a6a55; cursor: pointer;
      font-family: 'Noto Serif KR', serif;
      display: flex; align-items: center; gap: .4rem;
      box-shadow: 0 1px 6px rgba(0,0,0,.07);
      transition: all .2s; z-index: 100;
    }
    #btn-history:hover { background: #7a6a55; color: #fff; border-color: #7a6a55; }
    #btn-history .badge {
      background: #9a8a6e; color: #fff;
      border-radius: 50px; font-size: .7rem;
      padding: .05rem .45rem; font-weight: 600;
    }
    #btn-history:hover .badge { background: #fff; color: #7a6a55; }

    /* ── 패널 ── */
    .panel-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(44,40,37,.35); z-index: 200;
    }
    .panel-overlay.open { display: block; }
    .history-panel {
      position: fixed; top: 0; right: 0;
      width: min(400px, 94vw); height: 100vh;
      background: #faf7f2; border-left: 1px solid #e8dfd2;
      box-shadow: -4px 0 24px rgba(0,0,0,.08);
      display: flex; flex-direction: column;
      z-index: 300;
      transform: translateX(100%);
      transition: transform .32s cubic-bezier(.4,0,.2,1);
    }
    .history-panel.open { transform: translateX(0); }
    .panel-header {
      display: flex; flex-direction: column;
      padding: 1.2rem 1.6rem 0;
      border-bottom: 1px solid #e8dfd2;
    }
    .panel-header-top {
      display: flex; align-items: center;
      justify-content: space-between;
      padding-bottom: .9rem; width: 100%;
    }
    .panel-header h2 {
      font-size: .85rem; letter-spacing: .3em;
      color: #9a8a6e; font-family: 'Noto Serif KR', serif;
      font-weight: 400; text-transform: uppercase;
    }
    #btn-close-panel {
      background: none; border: none; color: #bbb0a0;
      font-size: 1.3rem; cursor: pointer;
      padding: .2rem .4rem; line-height: 1; border-radius: 4px;
    }
    #btn-close-panel:hover { color: #7a6a55; background: none; border: none; }
    .panel-tabs { display: flex; width: 100%; }
    .panel-tab {
      flex: 1; text-align: center; padding: .55rem 0;
      font-size: .8rem; color: #bbb0a0; cursor: pointer;
      border-bottom: 2px solid transparent;
      font-family: 'Noto Serif KR', serif;
      transition: all .2s; user-select: none;
    }
    .panel-tab.active { color: #7a6a55; border-bottom-color: #7a6a55; }
    .panel-body { overflow-y: auto; flex: 1; padding: 1rem 1.6rem 2rem; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .panel-empty {
      text-align: center; color: #c0b5a5;
      font-size: .9rem; margin-top: 3rem; line-height: 1.8;
    }

    /* 목록 */
    .history-date-group { margin-bottom: 1.6rem; }
    .history-date-label {
      font-size: .72rem; letter-spacing: .2em;
      color: #9a8a6e; font-family: 'Noto Serif KR', serif;
      margin-bottom: .6rem; text-transform: uppercase;
    }
    .history-item {
      background: #fff; border: 1px solid #ede6da;
      border-radius: 4px; margin-bottom: .5rem; overflow: hidden;
    }
    .history-item-header {
      padding: .75rem 1rem; cursor: pointer;
      display: flex; flex-direction: column;
      gap: .25rem; user-select: none;
    }
    .history-item-header:hover { background: #fdf9f4; }
    .history-item-top {
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: .5rem;
    }
    .history-item-quote {
      font-size: .85rem; color: #4a3f35;
      line-height: 1.6; flex: 1;
    }
    .history-item-chevron {
      color: #c8b99a; font-size: .7rem;
      flex-shrink: 0; margin-top: .3rem;
      transition: transform .25s;
    }
    .history-item.expanded .history-item-chevron { transform: rotate(180deg); }
    .history-item-meta {
      display: flex; justify-content: space-between; align-items: center;
    }
    .history-item-author {
      font-size: .75rem; color: #bbb0a0;
      font-style: italic; font-family: 'Noto Serif KR', serif;
    }
    .history-item-right {
      display: flex; align-items: center; gap: .4rem;
    }
    .history-item-date {
      font-size: .7rem; color: #c8b99a;
      font-family: 'Noto Serif KR', serif; letter-spacing: .05em;
    }
    .history-item-note {
      font-size: .78rem; color: #9a8a6e;
      font-style: italic; margin-top: .3rem;
      font-family: 'Noto Serif KR', serif;
    }
    .history-item-note::before { content: '"'; }
    .history-item-note::after  { content: '"'; }
    .history-item-mission {
      max-height: 0; overflow: hidden;
      transition: max-height .3s ease, padding .3s ease;
      padding: 0 1rem; font-size: .82rem;
      color: #7a6a55; line-height: 1.7;
      border-top: 0px solid #ede6da;
    }
    .history-item.expanded .history-item-mission {
      max-height: 200px; padding: .7rem 1rem .9rem;
      border-top-width: 1px;
    }

    /* 기록 수정 */
    .btn-hist-edit {
      border: none; background: none; color: #c8b99a;
      font-size: .72rem; cursor: pointer; padding: .1rem .3rem;
      font-family: 'Noto Serif KR', serif; transition: color .15s;
    }
    .btn-hist-edit:hover { color: #7a6a55; background: none; border: none; }
    .history-item-edit {
      max-height: 0; overflow: hidden;
      transition: max-height .35s ease, padding .35s ease;
      padding: 0 1rem; background: #fdf9f4;
      border-top: 0px solid #ede6da;
    }
    .history-item-edit.open {
      max-height: 260px; padding: .8rem 1rem .9rem;
      border-top-width: 1px;
    }
    .hist-edit-actions {
      display: flex; justify-content: flex-end;
      gap: .4rem; margin-top: .5rem;
    }
    .btn-hist-save {
      background: #9a8a6e; border: none; color: #fff;
      border-radius: 50px; padding: .28rem .9rem;
      font-size: .74rem; cursor: pointer;
      font-family: 'Noto Serif KR', serif;
    }
    .btn-hist-save:hover { background: #7a6a55; border: none; color: #fff; }
    .btn-hist-cancel-edit {
      background: none; border: 1px solid #d4c9b8; color: #9a8a6e;
      border-radius: 50px; padding: .28rem .9rem;
      font-size: .74rem; cursor: pointer;
      font-family: 'Noto Serif KR', serif;
    }
    .btn-hist-cancel-edit:hover { border-color: #9a8a6e; color: #5e5040; background: none; }

    /* 캘린더 */
    .cal-nav {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 1rem;
    }
    .cal-nav-title {
      font-size: .95rem; color: #4a3f35;
      font-family: 'Noto Serif KR', serif;
      font-weight: 600; letter-spacing: .05em;
    }
    .cal-nav-btn {
      background: none; border: 1px solid #e8dfd2;
      color: #9a8a6e; width: 28px; height: 28px;
      border-radius: 50%; cursor: pointer;
      font-size: .8rem; display: flex;
      align-items: center; justify-content: center; padding: 0;
    }
    .cal-nav-btn:hover { background: #f5f0e8; border: 1px solid #e8dfd2; color: #5e5040; }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7,1fr); gap: 3px;
    }
    .cal-day-name {
      text-align: center; font-size: .68rem;
      color: #bbb0a0; font-family: 'Noto Serif KR', serif; padding: .3rem 0;
    }
    .cal-day-name:first-child { color: #e0856a; }
    .cal-day-name:last-child  { color: #7a9ae0; }
    .cal-cell {
      aspect-ratio: 1; display: flex;
      align-items: center; justify-content: center;
      font-size: .78rem; border-radius: 50%;
      color: #9a8a6e; font-family: 'Noto Serif KR', serif;
    }
    .cal-cell.empty { background: none; }
    .cal-cell.today { border: 1px solid #c8b99a; color: #7a6a55; font-weight: 600; }
    .cal-cell.has-mission {
      cursor: pointer; font-weight: 700;
      color: #4a3f35;
    }
    .cal-cell.has-mission:hover { background: #f0ebe3; }
    .cal-cell.has-mission.selected {
      background: #9a8a6e; color: #fff;
    }
    .cal-cell.has-mission.selected.sun { background: #e0a090; }
    .cal-cell.today.selected { border-color: transparent; }
    .cal-cell.sun { color: #e0856a; }
    .cal-cell.has-mission.sun { color: #d06050; }
    .cal-stats {
      margin-top: 1rem; padding: .9rem 1rem;
      background: #fff; border: 1px solid #ede6da;
      border-radius: 6px; font-size: .85rem;
      color: #7a6a55; text-align: center; line-height: 1.7;
    }
    .cal-stats .highlight { font-weight: 600; color: #4a3f35; }
    .cal-congrats {
      margin-top: .7rem; padding: .8rem 1rem;
      background: #fdf6e3; border: 1px solid #e8d8a0;
      border-radius: 6px; font-size: .82rem;
      color: #8a6f20; text-align: center;
      line-height: 1.7; display: none;
    }
    .cal-congrats.show { display: block; }
    .cal-detail { margin-top: 1rem; }
    .cal-detail-date {
      font-size: .72rem; letter-spacing: .2em;
      color: #9a8a6e; font-family: 'Noto Serif KR', serif;
      margin-bottom: .5rem; text-transform: uppercase;
    }

    /* ── 연속 달성 축하 ── */
    .streak-overlay {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .streak-msg {
      background: #fff; border-radius: 20px;
      padding: 2rem 2.8rem; text-align: center;
      box-shadow: 0 12px 48px rgba(0,0,0,.18);
      animation: streakPop .45s cubic-bezier(.34,1.56,.64,1) forwards,
                 streakFade .45s ease 2.1s forwards;
    }
    @keyframes streakPop {
      from { opacity: 0; transform: scale(.6) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes streakFade {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(.9); }
    }
    .streak-emoji { font-size: 3.2rem; display: block; margin-bottom: .6rem; }
    .streak-title {
      font-size: 1.4rem; font-weight: 600; color: #4a3f35;
      font-family: 'Noto Serif KR', serif; letter-spacing: .03em;
    }
    .streak-sub {
      font-size: .88rem; color: #9a8a6e; margin-top: .4rem;
      font-family: 'Noto Serif KR', serif;
    }
    .confetti-piece {
      position: fixed; top: -12px; border-radius: 3px;
      animation: confettiFall linear forwards;
      pointer-events: none; z-index: 9998;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg) scaleX(1); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(105vh) rotate(680deg) scaleX(-1); opacity: 0; }
    }

    /* ── 월 대표 명언 선택 모달 ── */
    .fav-picker-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(44,40,37,.5);
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .fav-picker-box {
      background: #faf7f2; border-radius: 8px;
      max-width: 560px; width: 100%;
      max-height: 80vh; display: flex; flex-direction: column;
      box-shadow: 0 12px 48px rgba(0,0,0,.18);
      overflow: hidden;
    }
    .fav-picker-header {
      padding: 1.6rem 1.8rem 1.2rem;
      border-bottom: 1px solid #e8dfd2;
    }
    .fav-picker-title {
      font-size: 1rem; font-weight: 600;
      color: #4a3f35; font-family: 'Noto Serif KR', serif;
      letter-spacing: .03em; margin-bottom: .35rem;
    }
    .fav-picker-sub {
      font-size: .8rem; color: #9a8a6e;
      font-family: 'Noto Serif KR', serif;
    }
    .fav-picker-list {
      overflow-y: auto; padding: .8rem 1.2rem; flex: 1;
    }
    .fav-picker-item {
      background: #fff; border: 1px solid #e8dfd2;
      border-radius: 6px; padding: 1rem 1.2rem;
      margin-bottom: .6rem; cursor: pointer;
      transition: border-color .2s, box-shadow .2s;
    }
    .fav-picker-item:hover {
      border-color: #9a8a6e; box-shadow: 0 2px 8px rgba(0,0,0,.07);
    }
    .fav-picker-quote {
      font-size: .9rem; line-height: 1.7;
      color: #2c2825; word-break: keep-all;
    }
    .fav-picker-author {
      font-size: .78rem; color: #bbb0a0;
      font-style: italic; margin-top: .35rem;
      font-family: 'Noto Serif KR', serif;
    }
    .fav-picker-actions {
      padding: .9rem 1.8rem 1.2rem;
      border-top: 1px solid #e8dfd2; text-align: right;
    }
    .fav-picker-skip {
      border: none; background: none;
      color: #bbb0a0; font-size: .8rem; cursor: pointer;
      font-family: 'Noto Serif KR', serif; padding: .3rem .6rem;
    }
    .fav-picker-skip:hover { color: #7a6a55; background: none; border: none; }

    /* ── 월 대표 명언 카드 (캘린더) ── */
    .monthly-fav-card {
      margin-top: 1rem; padding: 1rem 1.2rem;
      background: #fdf9f4; border: 1px solid #e8d8a0;
      border-radius: 6px; border-left: 3px solid #c8a060;
    }
    .monthly-fav-label {
      font-size: .7rem; letter-spacing: .2em;
      text-transform: uppercase; color: #9a6a20;
      font-family: 'Noto Serif KR', serif; margin-bottom: .5rem;
    }
    .monthly-fav-text {
      font-size: .9rem; line-height: 1.7;
      color: #2c2825; word-break: keep-all;
    }
    .monthly-fav-author {
      font-size: .78rem; color: #bbb0a0;
      font-style: italic; margin-top: .4rem;
      font-family: 'Noto Serif KR', serif;
    }
    .monthly-fav-pick { margin-top: .8rem; text-align: center; }
    .btn-pick-fav {
      border: 1px solid #c8b99a; background: none;
      color: #9a6a20; font-size: .8rem; cursor: pointer;
      font-family: 'Noto Serif KR', serif;
      padding: .45rem 1.1rem; border-radius: 50px;
      transition: all .2s;
    }
    .btn-pick-fav:hover { background: #9a6a20; border-color: #9a6a20; color: #fff; }

    /* ── 대표 명언 저장 토스트 ── */
    .fav-toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: #4a3f35; color: #fff; border-radius: 50px;
      padding: .6rem 1.4rem; font-size: .85rem;
      font-family: 'Noto Serif KR', serif;
      box-shadow: 0 4px 16px rgba(0,0,0,.2);
      z-index: 9999; white-space: nowrap;
      animation: toastIn .3s ease, toastOut .3s ease 2.2s forwards;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    /* ── 이 명언 또 보기 모달 ── */
    .reshow-overlay {
      position: fixed; inset: 0; z-index: 600;
      background: rgba(44,40,37,.45);
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
      animation: toastIn .25s ease;
    }
    .reshow-box {
      background: #fff; border-radius: 14px;
      padding: 2rem 2.2rem 1.6rem; max-width: 320px; width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.16);
    }
    .reshow-emoji { font-size: 2.4rem; display: block; margin-bottom: .55rem; }
    .reshow-title {
      font-size: 1rem; font-weight: 600;
      color: #4a3f35; font-family: 'Noto Serif KR', serif;
      margin-bottom: .4rem; letter-spacing: .02em;
    }
    .reshow-sub {
      font-size: .82rem; color: #9a8a6e;
      font-family: 'Noto Serif KR', serif;
      line-height: 1.7; margin-bottom: 1.4rem;
    }
    .reshow-actions { display: flex; gap: .7rem; justify-content: center; }
    .btn-reshow-yes {
      background: #7a6a55; border: none; color: #fff;
      border-radius: 50px; padding: .52rem 1.4rem;
      font-size: .88rem; cursor: pointer;
      font-family: 'Noto Serif KR', serif; transition: background .2s;
    }
    .btn-reshow-yes:hover { background: #5e5040; border: none; color: #fff; }
    .btn-reshow-no {
      background: none; border: 1px solid #d4c9b8; color: #9a8a6e;
      border-radius: 50px; padding: .52rem 1.4rem;
      font-size: .88rem; cursor: pointer;
      font-family: 'Noto Serif KR', serif;
    }
    .btn-reshow-no:hover { border-color: #9a8a6e; color: #7a6a55; background: none; }
    .btn-reshow-hint {
      flex-shrink: 0;
      border: 1px solid #c8b99a; color: #9a6a20;
      padding: .28rem .75rem; font-size: .72rem;
      border-radius: 50px; cursor: pointer;
      background: #fdf6e3; transition: all .2s;
      white-space: nowrap; font-family: 'Noto Serif KR', serif;
      align-self: flex-start; margin-top: .1rem;
    }
    .btn-reshow-hint:hover { background: #9a6a20; border-color: #9a6a20; color: #fff; }
  </style>
</head>
<body>

  <button id="btn-history">나의 기록 <span class="badge" id="done-badge">0</span></button>

  <div class="panel-overlay" id="panel-overlay"></div>
  <div class="history-panel" id="history-panel">
    <div class="panel-header">
      <div class="panel-header-top">
        <h2>나의 기록</h2>
        <button id="btn-close-panel">✕</button>
      </div>
      <div class="panel-tabs">
        <div class="panel-tab active" data-tab="list">목록</div>
        <div class="panel-tab" data-tab="calendar">캘린더</div>
      </div>
    </div>
    <div class="panel-body">
      <div class="tab-content active" id="tab-list"></div>
      <div class="tab-content" id="tab-calendar"></div>
    </div>
  </div>

  <h1 id="page-title">이달의 명언</h1>

  <div class="quote-card" id="card">
    <div class="quote-mark">"</div>
    <p class="quote-text" id="quote-text"></p>
    <div class="quote-author">
      <strong id="quote-author"></strong>
      <span id="quote-info"></span>
    </div>
  </div>

  <div class="mission-container" id="mission-container"></div>

  <div id="all-done-banner" style="display:none" class="all-done-banner">
    <div id="all-done-full-msg" style="display:none">
      <span class="all-done-emoji">🏆</span>
      <div class="all-done-text">오늘 할 수 있는 미션을 다 끝냈어요!<br>오늘 하루도 정말 수고했어요.</div>
    </div>
    <div class="all-done-nav">
      <button id="btn-done-prev">‹</button>
      <span class="all-done-nav-label" id="done-nav-label">1 / 2</span>
      <button id="btn-done-next">›</button>
    </div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <div class="progress-label" id="progress-label"></div>
  </div>

  <div class="controls">
    <button id="btn-random">다른 명언 보기</button>
    <button id="btn-extra" style="display:none">추가 미션 하기</button>
  </div>

  <script src="data.js"></script>
  <script>
  const DIFFS = [
    { key: 'easy',   label: '쉬움', cls: 'diff-easy'   },
    { key: 'normal', label: '보통', cls: 'diff-normal' },
    { key: 'hard',   label: '도전', cls: 'diff-hard'   },
  ];
  const EMOJIS = ['😊','😄','🥰','💪','😌','🤔','😢','😤','🥺','😮'];
  const quotes = QUOTES_DATA;
  const STORAGE_KEY = 'quote_done_v3';
  const LAST_KEY    = 'quote_last';
  const TOTAL       = quotes.length; // 100

  function today() {
    return new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit'})
      .replace(/\. ?/g, '-').replace(/-$/, '');
  }

  // doneMap: { [idx]: { easy: {date,note}|false, normal: ..., hard: ... } }
  function loadDone() {
    try {
      const raw = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      // 이전 포맷 무시하고 새 구조만 사용
      const valid = {};
      Object.entries(raw).forEach(([k, v]) => {
        if (v && typeof v === 'object' && ('easy' in v || 'normal' in v || 'hard' in v)) {
          valid[k] = v;
        }
      });
      return valid;
    } catch { return {}; }
  }
  function saveDone(obj) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(obj));
  }
  let doneMap = loadDone();
  let todayDoneNavIdx = 0;

  function getTodayDoneIdxs() {
    const t = today();
    return Object.entries(doneMap)
      .filter(([, v]) => v && DIFFS.some(d => v[d.key] && v[d.key].date === t))
      .map(([idx]) => parseInt(idx));
  }
  function countTodayDone() { return getTodayDoneIdxs().length; }
  function isAllDoneToday() { return countTodayDone() >= 3; }
  function isCurrentDoneToday() {
    const t = today();
    const v = doneMap[current];
    return !!(v && DIFFS.some(d => v[d.key] && v[d.key].date === t));
  }
  // 현재 명언이 오늘 완료됐고 아직 3개 미만인 경우 → 잠금(추가 미션 유도)
  function isLocked() { return isCurrentDoneToday() && !isAllDoneToday(); }
  // 스와이프/드래그 차단 여부: 현재 명언이 오늘 완료된 경우
  function isNavBlocked() { return isCurrentDoneToday(); }

  function updateNavState() {
    const allDone   = isAllDoneToday();
    const locked    = isLocked();
    const todayCount = countTodayDone();
    const showNav   = todayCount >= 2;

    document.getElementById('btn-random').style.display = (!locked && !allDone) ? '' : 'none';
    document.getElementById('btn-extra').style.display  = locked ? '' : 'none';

    const banner  = document.getElementById('all-done-banner');
    const fullMsg = document.getElementById('all-done-full-msg');
    if (banner)  banner.style.display  = showNav ? '' : 'none';
    if (fullMsg) fullMsg.style.display = allDone ? '' : 'none';

    if (showNav) {
      const idxs = getTodayDoneIdxs();
      const pos = idxs.indexOf(current);
      todayDoneNavIdx = pos >= 0 ? pos : 0;
      const label = document.getElementById('done-nav-label');
      if (label) label.textContent = (todayDoneNavIdx + 1) + ' / ' + idxs.length;
    }
  }

  const SELECTED_KEY = 'quote_selected_v1';
  function loadSelected() {
    try { return JSON.parse(localStorage.getItem(SELECTED_KEY)) || {}; }
    catch { return {}; }
  }
  function saveSelected(obj) { localStorage.setItem(SELECTED_KEY, JSON.stringify(obj)); }
  let selectedMap = loadSelected();

  const MONTHLY_FAV_KEY  = 'quote_monthly_fav_v1';
  const FAV_PROMPTED_KEY = 'quote_fav_prompted_v1';
  function loadMonthlyFav() {
    try { return JSON.parse(localStorage.getItem(MONTHLY_FAV_KEY)) || {}; }
    catch { return {}; }
  }
  function saveMonthlyFav(obj) { localStorage.setItem(MONTHLY_FAV_KEY, JSON.stringify(obj)); }
  let monthlyFav = loadMonthlyFav();

  const RESHOW_KEY = 'quote_reshow_v1';
  function loadReshow() {
    try { return new Set(JSON.parse(localStorage.getItem(RESHOW_KEY))?.[getYM()] || []); }
    catch { return new Set(); }
  }
  function addToReshow(idx) {
    try {
      const raw = JSON.parse(localStorage.getItem(RESHOW_KEY)) || {};
      const ym = getYM();
      if (!raw[ym]) raw[ym] = [];
      if (!raw[ym].includes(idx)) raw[ym].push(idx);
      localStorage.setItem(RESHOW_KEY, JSON.stringify(raw));
      reshowSet.add(idx);
    } catch {}
  }
  let reshowSet = loadReshow();

  function getFavPrompted() {
    try { return JSON.parse(localStorage.getItem(FAV_PROMPTED_KEY)) || []; }
    catch { return []; }
  }
  function addFavPrompted(ym) {
    const arr = getFavPrompted();
    if (!arr.includes(ym)) { arr.push(ym); localStorage.setItem(FAV_PROMPTED_KEY, JSON.stringify(arr)); }
  }

  function getYM(date) {
    const d = date || new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
  }

  function getCompletedForMonth(ym) {
    const prefix = ym + '-';
    const idxSet = new Set();
    Object.entries(doneMap).forEach(([idx, v]) => {
      if (!v) return;
      DIFFS.forEach(d => {
        const entry = v[d.key];
        if (entry && entry.date && entry.date.startsWith(prefix)) idxSet.add(parseInt(idx));
      });
    });
    return [...idxSet];
  }

  function getDiffEntry(idx, diffKey) {
    return doneMap[idx]?.[diffKey] || false;
  }
  function setDiffEntry(idx, diffKey, value) {
    if (!doneMap[idx]) doneMap[idx] = {};
    doneMap[idx][diffKey] = value;
    saveDone(doneMap);
  }
  function countDone() {
    return getCompletedForMonth(getYM()).length;
  }

  // ── 랜덤 시작 — 이번 달 미완료 항목 중에서 랜덤 ──
  function pickRandom() {
    const doneThisMonth = new Set(getCompletedForMonth(getYM()));
    const available = quotes.reduce((arr, _, i) => {
      if (!doneThisMonth.has(i)) { arr.push(i); return arr; }
      // reshow 등록 + 미완료 난이도 있으면 pool에 포함
      if (reshowSet.has(i) && DIFFS.some(d => !getDiffEntry(i, d.key))) arr.push(i);
      return arr;
    }, []);
    const pool = available.length > 0 ? available : quotes.map((_, i) => i);
    const last = parseInt(localStorage.getItem(LAST_KEY) ?? '-1');
    const candidates = pool.filter(i => i !== last);
    const next = (candidates.length > 0 ? candidates : pool)[Math.floor(Math.random() * (candidates.length > 0 ? candidates : pool).length)];
    localStorage.setItem(LAST_KEY, next);
    return next;
  }
  const _todayDoneIdxs = getTodayDoneIdxs();
  let current = (_todayDoneIdxs.length > 0) ? _todayDoneIdxs[0] : pickRandom();
  if (_todayDoneIdxs.length > 0) localStorage.setItem(LAST_KEY, current);

  // ── 타이틀 ──
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const _nt = new Date();
  document.getElementById('page-title').textContent =
    _nt.getFullYear() + '년 ' + monthNames[_nt.getMonth()] + ' ' + _nt.getDate() + '일의 명언';

  // ── DOM refs ──
  const card      = document.getElementById('card');
  const textEl    = document.getElementById('quote-text');
  const authorEl  = document.getElementById('quote-author');
  const infoEl    = document.getElementById('quote-info');
  const missionContainer = document.getElementById('mission-container');
  const progressFill  = document.getElementById('progress-fill');
  const progressLabel = document.getElementById('progress-label');

  // ── 프로그레스 ──
  function updateProgress() {
    const done = countDone();
    progressFill.style.width = Math.round(done / TOTAL * 100) + '%';
    progressLabel.textContent = done + ' / ' + TOTAL + ' 완료';
    document.getElementById('done-badge').textContent = done;
  }

  // ── 미션 렌더링 ──
  function renderMissions(idx) {
    const q = quotes[idx];

    // reshow 모드: reshowSet 등록 + 미완료 난이도 존재 + 오늘 전체 완료 아님 + 오늘 이 명언 완료 안 함
    const uncompletedDiffs = DIFFS.filter(d => !getDiffEntry(idx, d.key));
    const isDoneToday = DIFFS.some(d => { const e = getDiffEntry(idx, d.key); return e && e.date === today(); });
    const isReshow = reshowSet.has(idx) && uncompletedDiffs.length > 0 && !isAllDoneToday() && !isDoneToday;

    // 완료된 난이도 찾기 (reshow 모드면 무시)
    // 전체완료 탐색 시엔 오늘 완료한 diff를 우선 표시
    const todayDiff = DIFFS.find(d => { const e = getDiffEntry(idx, d.key); return e && e.date === today(); });
    const doneDiff = isReshow ? null : (todayDiff || DIFFS.find(d => !!getDiffEntry(idx, d.key)));
    // 선택됐지만 아직 완료 전인 난이도 찾기
    const selKey   = !doneDiff ? (selectedMap[idx] || null) : null;
    // reshow면 미완료 난이도 pool, 아니면 전체
    const diffPool = isReshow ? uncompletedDiffs : DIFFS;
    const activeDiff = doneDiff || (selKey ? diffPool.find(d => d.key === selKey) : null);

    if (activeDiff) {
      // 선택된 미션 하나만 표시
      const d     = activeDiff;
      const entry = getDiffEntry(idx, d.key);
      const isDone = !!entry;
      const note   = (entry && entry.note)  ? entry.note  : '';
      const emoji  = (entry && entry.emoji) ? entry.emoji : '';
      const noteDisplay = emoji ? emoji + ' ' + note : note;
      missionContainer.innerHTML = `
        <div class="mission-row" id="row-${d.key}">
          <div class="mission-row-body">
            <div class="mission-icon">🎯</div>
            <div class="mission-info">
              <div class="mission-label-row">
                <span class="mission-label">오늘의 미션</span>
                <span class="difficulty-badge ${d.cls}">${d.label}</span>
              </div>
              <div class="mission-text">${q.missions[d.key]}</div>
              <div class="note-display" id="note-display-${d.key}" style="${(emoji || note) ? 'display:block' : 'display:none'}">${noteDisplay}</div>
            </div>
            <div class="btn-group-col">
              <button class="btn-done ${isDone ? 'done locked' : ''}" id="btn-done-${d.key}" data-diff="${d.key}">${isDone ? '완료 ✓' : '완료'}</button>
              ${!isDone ? `<button class="btn-cancel" id="btn-cancel-select" data-diff="${d.key}">취소</button>` : ''}
              ${isDone && !reshowSet.has(idx) && uncompletedDiffs.length > 0 ? `<button class="btn-reshow-hint" id="btn-reshow-hint">💭 또 보기</button>` : ''}
            </div>
          </div>
          <div class="note-area" id="note-area-${d.key}">
            <div class="note-input-wrap">
              <div class="note-input-header">오늘의 느낀 점</div>
              <div class="emoji-picker" id="emoji-picker-${d.key}">
                ${EMOJIS.map(em => `<button class="emoji-btn${emoji === em ? ' selected' : ''}" data-emoji="${em}">${em}</button>`).join('')}
              </div>
              <textarea class="note-textarea" id="note-input-${d.key}" placeholder="미션을 실천하면서 느낀 점을 자유롭게 기록해보세요 (최대 100자)" maxlength="100" rows="2"></textarea>
              <div class="note-input-actions">
                <button class="btn-note-save" id="btn-save-${d.key}" data-diff="${d.key}">저장</button>
              </div>
            </div>
          </div>
        </div>`;

      document.getElementById('btn-done-' + d.key).addEventListener('click', () => {
        if (!!getDiffEntry(idx, d.key)) return; // 이미 완료 — 잠금
        const isThirdMission = countTodayDone() === 2;
        setDiffEntry(idx, d.key, { date: today(), note: '' });
        updateProgress();
        renderMissions(idx);
        updateNavState();
        openNoteArea(d.key);
        if (isThirdMission) {
          // 또 보기 창 먼저, 닫으면 축하 애니메이션
          const _left = DIFFS.filter(d => !getDiffEntry(idx, d.key));
          if (!isReshow && _left.length > 0) {
            showReshowModal(idx, () => setTimeout(showAllDoneCelebration, 300));
          } else {
            setTimeout(showAllDoneCelebration, 400);
          }
        } else {
          const streak = getCurrentStreak();
          if (streak >= 3) showStreakCelebration(streak);
          // 일반 완료 시(reshow 아님)에만 "또 보기" 모달 표시
          if (!isReshow) {
            const _left = DIFFS.filter(d => !getDiffEntry(idx, d.key));
            if (_left.length > 0) showReshowModal(idx);
          }
          setTimeout(checkLastDayFavorite, 1500);
        }
      });

      const cancelSelectBtn = document.getElementById('btn-cancel-select');
      if (cancelSelectBtn) cancelSelectBtn.addEventListener('click', () => {
        delete selectedMap[idx];
        saveSelected(selectedMap);
        renderMissions(idx);
        updateProgress();
      });

      const reshowHintBtn = document.getElementById('btn-reshow-hint');
      if (reshowHintBtn) reshowHintBtn.addEventListener('click', () => showReshowModal(idx));

      document.querySelectorAll('#emoji-picker-' + d.key + ' .emoji-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const already = btn.classList.contains('selected');
          document.querySelectorAll('#emoji-picker-' + d.key + ' .emoji-btn').forEach(b => b.classList.remove('selected'));
          if (!already) btn.classList.add('selected');
        });
      });
      document.getElementById('btn-save-' + d.key).addEventListener('click', () => saveNote(idx, d.key));
      document.getElementById('note-input-' + d.key).addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveNote(idx, d.key); }
      });

    } else {
      // diffPool 기준으로 선택 버튼 표시 (일반: 3개, reshow: 미완료만)
      missionContainer.innerHTML = diffPool.map(d => `
        <div class="mission-row" id="row-${d.key}">
          <div class="mission-row-body">
            <div class="mission-icon">🎯</div>
            <div class="mission-info">
              <div class="mission-label-row">
                <span class="mission-label">오늘의 미션</span>
                <span class="difficulty-badge ${d.cls}">${d.label}</span>
              </div>
              <div class="mission-text">${q.missions[d.key]}</div>
            </div>
            <button class="btn-select" id="btn-select-${d.key}" data-diff="${d.key}">선택</button>
          </div>
        </div>`).join('');

      diffPool.forEach(d => {
        document.getElementById('btn-select-' + d.key)?.addEventListener('click', () => {
          selectedMap[idx] = d.key;
          saveSelected(selectedMap);
          renderMissions(idx);
        });
      });
    }
  }

  function openNoteArea(diffKey) {
    const area  = document.getElementById('note-area-' + diffKey);
    const input = document.getElementById('note-input-' + diffKey);
    const entry = getDiffEntry(current, diffKey);
    input.value = (entry && entry.note) ? entry.note : '';
    area.classList.add('open');
    input.focus();
  }
  function closeNoteArea(diffKey) {
    document.getElementById('note-area-' + diffKey)?.classList.remove('open');
  }
  function saveNote(idx, diffKey) {
    const note      = document.getElementById('note-input-' + diffKey).value.trim();
    const selEmoji  = document.querySelector('#emoji-picker-' + diffKey + ' .emoji-btn.selected')?.dataset.emoji || '';
    const entry = getDiffEntry(idx, diffKey);
    if (entry) {
      entry.note  = note;
      entry.emoji = selEmoji;
      setDiffEntry(idx, diffKey, entry);
    }
    closeNoteArea(diffKey);
    const display = document.getElementById('note-display-' + diffKey);
    const displayText = selEmoji ? selEmoji + ' ' + note : note;
    if (displayText) { display.textContent = displayText; display.style.display = 'block'; }
    else             { display.style.display = 'none'; }
  }

  // ── show ──
  function show(index, animate = true) {
    const q = quotes[index];
    if (animate) {
      card.classList.add('fade');
      missionContainer.classList.add('fade');
      setTimeout(() => {
        textEl.textContent = q.text;
        authorEl.textContent = '— ' + q.author;
        infoEl.textContent = q.info;
        renderMissions(index);
        updateProgress();
        updateNavState();
        card.classList.remove('fade');
        missionContainer.classList.remove('fade');
      }, 400);
    } else {
      textEl.textContent = q.text;
      authorEl.textContent = '— ' + q.author;
      infoEl.textContent = q.info;
      renderMissions(index);
      updateProgress();
      updateNavState();
    }
  }

  function goTo(index) {
    current = (index + quotes.length) % quotes.length;
    show(current);
  }

  document.getElementById('btn-random').addEventListener('click', () => {
    goTo(pickRandom());
  });

  document.getElementById('btn-extra').addEventListener('click', () => {
    if (isAllDoneToday()) return;
    goTo(pickRandom());
  });

  document.getElementById('btn-done-prev').addEventListener('click', () => {
    const idxs = getTodayDoneIdxs();
    if (idxs.length === 0) return;
    todayDoneNavIdx = (todayDoneNavIdx - 1 + idxs.length) % idxs.length;
    goTo(idxs[todayDoneNavIdx]);
  });
  document.getElementById('btn-done-next').addEventListener('click', () => {
    const idxs = getTodayDoneIdxs();
    if (idxs.length === 0) return;
    todayDoneNavIdx = (todayDoneNavIdx + 1) % idxs.length;
    goTo(idxs[todayDoneNavIdx]);
  });

  // 스와이프
  let touchStartX = 0;
  card.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  card.addEventListener('touchend', e => {
    if (isNavBlocked()) return;
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) goTo(current + (diff > 0 ? 1 : -1));
  }, { passive: true });

  // 마우스 드래그
  let dragStartX = 0, dragging = false;
  card.addEventListener('mousedown', e => { dragStartX = e.clientX; dragging = true; });
  card.addEventListener('mouseup', e => {
    if (!dragging) return; dragging = false;
    if (isNavBlocked()) return;
    const diff = dragStartX - e.clientX;
    if (Math.abs(diff) > 40) goTo(current + (diff > 0 ? 1 : -1));
  });
  card.addEventListener('mouseleave', () => { dragging = false; });

  // ── 패널 ──
  const overlay  = document.getElementById('panel-overlay');
  const panel    = document.getElementById('history-panel');
  const tabList  = document.getElementById('tab-list');
  const tabCal   = document.getElementById('tab-calendar');
  let calYear = new Date().getFullYear(), calMonth = new Date().getMonth();

  function openPanel() { renderList(); renderCalendar(); overlay.classList.add('open'); panel.classList.add('open'); }
  function closePanel() { overlay.classList.remove('open'); panel.classList.remove('open'); }

  document.querySelectorAll('.panel-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    });
  });

  document.getElementById('btn-history').addEventListener('click', openPanel);
  document.getElementById('btn-close-panel').addEventListener('click', closePanel);
  overlay.addEventListener('click', closePanel);

  // ── 목록 탭 ──
  function diffLabel(key) { return DIFFS.find(d => d.key === key)?.label || key; }
  function diffCls(key)   { return DIFFS.find(d => d.key === key)?.cls || ''; }

  function renderList() {
    // 날짜 기준으로 모든 완료 항목 수집
    const entries = [];
    Object.entries(doneMap).forEach(([idx, v]) => {
      if (!v) return;
      DIFFS.forEach(d => {
        const entry = v[d.key];
        if (entry && entry.date) {
          entries.push({ date: entry.date, note: entry.note || '', emoji: entry.emoji || '', idx: parseInt(idx), diffKey: d.key });
        }
      });
    });
    entries.sort((a, b) => b.date.localeCompare(a.date));

    if (!entries.length) {
      tabList.innerHTML = '<p class="panel-empty">아직 완료한 미션이 없어요.<br>오늘의 미션을 실천해보세요!</p>';
      return;
    }

    const groups = {};
    entries.forEach(e => {
      if (!groups[e.date]) groups[e.date] = [];
      groups[e.date].push(e);
    });

    tabList.innerHTML = Object.entries(groups).map(([date, items]) => `
      <div class="history-date-group">
        <div class="history-date-label">${date}</div>
        ${items.map(({ idx, diffKey, note, emoji }) => {
          const noteDisplay = emoji ? emoji + ' ' + note : note;
          return `
          <div class="history-item" style="border-left-color:${diffKey==='easy'?'#8ab88a':diffKey==='normal'?'#c8a060':'#c08080'}">
            <div class="history-item-header">
              <div class="history-item-top">
                <div class="history-item-quote">${quotes[idx].text}</div>
                <div class="history-item-chevron">▼</div>
              </div>
              <div class="history-item-meta">
                <div class="history-item-author">— ${quotes[idx].author}</div>
                <div class="history-item-right">
                  <span class="difficulty-badge ${diffCls(diffKey)}">${diffLabel(diffKey)}</span>
                  <button class="btn-hist-edit" data-idx="${idx}" data-diff="${diffKey}">✎ 수정</button>
                </div>
              </div>
              <div class="history-item-note" id="hist-note-display-${idx}-${diffKey}"${noteDisplay ? '' : ' style="display:none"'}>${noteDisplay}</div>
            </div>
            <div class="history-item-edit" id="hist-edit-${idx}-${diffKey}">
              <div class="note-input-header">느낀 점 수정</div>
              <div class="emoji-picker" id="hist-emoji-${idx}-${diffKey}">
                ${EMOJIS.map(em => `<button class="emoji-btn${emoji === em ? ' selected' : ''}" data-emoji="${em}">${em}</button>`).join('')}
              </div>
              <textarea class="note-textarea" id="hist-input-${idx}-${diffKey}" maxlength="100" rows="2">${note}</textarea>
              <div class="hist-edit-actions">
                <button class="btn-hist-cancel-edit" data-idx="${idx}" data-diff="${diffKey}">취소</button>
                <button class="btn-hist-save" data-idx="${idx}" data-diff="${diffKey}">저장</button>
              </div>
            </div>
            <div class="history-item-mission">🎯 ${quotes[idx].missions[diffKey]}</div>
          </div>`;
        }).join('')}
      </div>
    `).join('');

    tabList.querySelectorAll('.history-item-header').forEach(h => {
      h.addEventListener('click', () => h.closest('.history-item').classList.toggle('expanded'));
    });

    tabList.querySelectorAll('.btn-hist-edit').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const editArea = document.getElementById(`hist-edit-${btn.dataset.idx}-${btn.dataset.diff}`);
        editArea.classList.toggle('open');
      });
    });

    tabList.querySelectorAll('.history-item-edit').forEach(editArea => {
      editArea.querySelectorAll('.emoji-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const already = btn.classList.contains('selected');
          editArea.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
          if (!already) btn.classList.add('selected');
        });
      });
    });

    tabList.querySelectorAll('.btn-hist-save').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx  = parseInt(btn.dataset.idx);
        const diff = btn.dataset.diff;
        const note = document.getElementById(`hist-input-${idx}-${diff}`).value.trim();
        const selEmoji = document.querySelector(`#hist-emoji-${idx}-${diff} .emoji-btn.selected`)?.dataset.emoji || '';
        const entry = getDiffEntry(idx, diff);
        if (entry) { entry.note = note; entry.emoji = selEmoji; setDiffEntry(idx, diff, entry); }
        const display = document.getElementById(`hist-note-display-${idx}-${diff}`);
        const displayText = selEmoji ? selEmoji + ' ' + note : note;
        if (displayText) { display.textContent = displayText; display.style.display = ''; }
        else { display.style.display = 'none'; }
        document.getElementById(`hist-edit-${idx}-${diff}`).classList.remove('open');
      });
    });

    tabList.querySelectorAll('.btn-hist-cancel-edit').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById(`hist-edit-${btn.dataset.idx}-${btn.dataset.diff}`).classList.remove('open');
      });
    });
  }

  // ── 캘린더 탭 ──
  function renderCalendar() {
    const y = calYear, m = calMonth;
    const mn = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    const pad = n => String(n).padStart(2, '0');
    const prefix = `${y}-${pad(m+1)}-`;

    // 날짜 → [{idx, diffKey, note, emoji}]
    const monthDone = {};
    Object.entries(doneMap).forEach(([idx, v]) => {
      if (!v) return;
      DIFFS.forEach(d => {
        const entry = v[d.key];
        if (entry && entry.date && entry.date.startsWith(prefix)) {
          const dd = entry.date.slice(-2);
          if (!monthDone[dd]) monthDone[dd] = [];
          monthDone[dd].push({ idx: parseInt(idx), diffKey: d.key, note: entry.note || '', emoji: entry.emoji || '' });
        }
      });
    });

    // 같은 명언을 여러 난이도로 완료해도 1개로 계산
    const doneCount = new Set(Object.values(monthDone).flat().map(e => e.idx)).size;
    const todayStr  = today();
    const firstDay  = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m + 1, 0).getDate();

    const cells = Array(firstDay).fill('<div class="cal-cell empty"></div>');
    for (let d = 1; d <= daysInMonth; d++) {
      const dd = pad(d);
      const dateStr = `${y}-${pad(m+1)}-${dd}`;
      const isToday = dateStr === todayStr;
      const isSun   = new Date(y, m, d).getDay() === 0;
      const has     = !!monthDone[dd];
      let cls = 'cal-cell' + (has ? ' has-mission' : '') + (isToday ? ' today' : '') + (isSun && !has ? ' sun' : '');
      cells.push(`<div class="${cls}" data-dd="${dd}">${d}</div>`);
    }

    const statsMsg = doneCount === 0
      ? '이번 달 아직 완료한 미션이 없어요.'
      : `이번 달 <span class="highlight">${doneCount}개</span>의 명언을 완료했어요!`;
    const isAllDone = doneCount >= TOTAL;

    const ym = `${y}-${pad(m+1)}`;
    const favData = monthlyFav[ym];
    const completedIdxsForCal = getCompletedForMonth(ym);
    const favHtml = favData
      ? `<div class="monthly-fav-card">
          <div class="monthly-fav-label">⭐ 이달의 대표 명언</div>
          <div class="monthly-fav-text">${quotes[favData.idx].text}</div>
          <div class="monthly-fav-author">— ${quotes[favData.idx].author}</div>
        </div>`
      : completedIdxsForCal.length > 0
        ? `<div class="monthly-fav-pick">
            <button class="btn-pick-fav" id="btn-pick-fav">⭐ 이달의 대표 명언 선택하기</button>
          </div>`
        : '';

    tabCal.innerHTML = `
      <div class="cal-nav">
        <button class="cal-nav-btn" id="cal-prev">‹</button>
        <div class="cal-nav-title">${y}년 ${mn[m]}</div>
        <button class="cal-nav-btn" id="cal-next">›</button>
      </div>
      <div class="cal-grid">
        ${['일','월','화','수','목','금','토'].map(n => `<div class="cal-day-name">${n}</div>`).join('')}
        ${cells.join('')}
      </div>
      <div class="cal-stats">${statsMsg}</div>
      <div class="cal-congrats ${isAllDone ? 'show' : ''}">
        🎉 이번 달 모든 미션을 완료했어요!<br>한 달 동안 정말 수고하셨습니다.
      </div>
      ${favHtml}
      <div class="cal-detail" id="cal-detail"></div>`;

    const pickFavBtn = document.getElementById('btn-pick-fav');
    if (pickFavBtn) pickFavBtn.addEventListener('click', () => showFavoritePicker(ym, completedIdxsForCal));

    function renderCalDetail(dd) {
      const dateStr = `${y}-${pad(m+1)}-${dd}`;
      const items = monthDone[dd];
      const detailEl = document.getElementById('cal-detail');
      if (!items) { detailEl.innerHTML = ''; return; }
      detailEl.innerHTML = `
        <div class="cal-detail-date">${dateStr}</div>
        ${items.map(({ idx, diffKey, note, emoji }) => {
          const noteDisplay = emoji ? emoji + ' ' + note : note;
          return `
          <div class="history-item" style="border-left-color:${diffKey==='easy'?'#8ab88a':diffKey==='normal'?'#c8a060':'#c08080'}; margin-bottom:.5rem">
            <div class="history-item-header">
              <div class="history-item-top">
                <div class="history-item-quote">${quotes[idx].text}</div>
                <div class="history-item-chevron">▼</div>
              </div>
              <div class="history-item-meta">
                <div class="history-item-author">— ${quotes[idx].author}</div>
                <span class="difficulty-badge ${diffCls(diffKey)}">${diffLabel(diffKey)}</span>
              </div>
              ${noteDisplay ? `<div class="history-item-note">${noteDisplay}</div>` : ''}
            </div>
            <div class="history-item-mission">🎯 ${quotes[idx].missions[diffKey]}</div>
          </div>`;
        }).join('')}`;
      detailEl.querySelectorAll('.history-item-header').forEach(h => {
        h.addEventListener('click', () => h.closest('.history-item').classList.toggle('expanded'));
      });
    }

    function selectCalCell(dd) {
      tabCal.querySelectorAll('.cal-cell.selected').forEach(c => c.classList.remove('selected'));
      const cell = tabCal.querySelector(`.cal-cell[data-dd="${dd}"]`);
      if (cell) cell.classList.add('selected');
      renderCalDetail(dd);
    }

    tabCal.querySelectorAll('.cal-cell.has-mission').forEach(cell => {
      cell.addEventListener('click', () => {
        selectCalCell(cell.dataset.dd);
        cell.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });
    });

    // 오늘 날짜 자동 선택
    const nowY = new Date().getFullYear(), nowM = new Date().getMonth();
    if (y === nowY && m === nowM) {
      const todayDD = pad(new Date().getDate());
      selectCalCell(todayDD);
    }

    document.getElementById('cal-prev').addEventListener('click', () => {
      calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar();
    });
    document.getElementById('cal-next').addEventListener('click', () => {
      calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar();
    });
  }

  // ── 연속 달성 streak ──
  function getCurrentStreak() {
    const dateSet = new Set();
    Object.values(doneMap).forEach(v => {
      if (!v) return;
      DIFFS.forEach(d => { if (v[d.key] && v[d.key].date) dateSet.add(v[d.key].date); });
    });
    if (!dateSet.size) return 0;
    function toKey(dt) {
      return dt.getFullYear() + '-' +
        String(dt.getMonth() + 1).padStart(2, '0') + '-' +
        String(dt.getDate()).padStart(2, '0');
    }
    let streak = 0;
    const check = new Date();
    while (dateSet.has(toKey(check))) { streak++; check.setDate(check.getDate() - 1); }
    return streak;
  }

  function showStreakCelebration(streak) {
    const colors = ['#9a8a6e','#c8b99a','#e8c46a','#8ab88a','#90b4e0','#e0a090','#c8a0d0'];
    for (let i = 0; i < 70; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      const size = 6 + Math.random() * 7;
      p.style.cssText = `left:${Math.random()*100}vw;width:${size}px;height:${size}px;` +
        `background:${colors[Math.floor(Math.random()*colors.length)]};` +
        `animation-duration:${1.4 + Math.random()*1.6}s;animation-delay:${Math.random()*.7}s`;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 3200);
    }
    const overlay = document.createElement('div');
    overlay.className = 'streak-overlay';
    const msgs = ['대단해요!','멋져요!','훌륭해요!'];
    overlay.innerHTML = `<div class="streak-msg">
      <span class="streak-emoji">🔥</span>
      <div class="streak-title">${streak}일 연속 달성! ${msgs[Math.min(streak-3,2)]}</div>
      <div class="streak-sub">꾸준함이 습관이 되고 있어요.<br>내일도 함께해요!</div>
    </div>`;
    document.body.appendChild(overlay);
    setTimeout(() => overlay.remove(), 2700);
  }

      const size = 6 + Math.random() * 9;

        `background:${colors[Math.floor(Math.random()*colors.length)]};` +

      <div class="streak-sub">하루 3개의 미션을 모두 끝냈어요.<br>오늘 하루도 정말 수고했어요!</div>
    </div>`;
    document.body.appendChild(ol);
    setTimeout(() => ol.remove(), 2900);

  function showReshowModal(idx, onClose = null) {
    // 이미 reshowSet에 있거나 모든 난이도 완료 시 표시 안함
    if (reshowSet.has(idx)) { if (onClose) onClose(); return; }
    if (DIFFS.every(d => !!getDiffEntry(idx, d.key))) { if (onClose) onClose(); return; }
    document.getElementById('reshow-modal')?.remove();
    const modal = document.createElement('div');
    modal.id = 'reshow-modal';
    modal.className = 'reshow-overlay';
    modal.innerHTML = `
      <div class="reshow-box">
        <span class="reshow-emoji">💭</span>
        <div class="reshow-title">이 명언 또 보기</div>
        <div class="reshow-sub">마음에 드는 명언인가요?<br>다른 난이도로 이달에 다시 도전할 수 있어요.</div>
        <div class="reshow-actions">
          <button class="btn-reshow-yes" id="btn-reshow-yes">또 보기</button>
          <button class="btn-reshow-no" id="btn-reshow-no">닫기</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    const close = (doReshow) => {
      if (doReshow) {
        addToReshow(idx);
        // 재렌더 없이 hint 버튼만 숨김 (느낀점 입력창 유지)
        const hintBtn = document.getElementById('btn-reshow-hint');
        if (hintBtn) hintBtn.style.display = 'none';
      }
      modal.remove();
      if (onClose) onClose();
    };
    document.getElementById('btn-reshow-yes').addEventListener('click', () => close(true));
    document.getElementById('btn-reshow-no').addEventListener('click', () => close(false));
    modal.addEventListener('click', e => { if (e.target === modal) close(false); });
  }

  // ── 월 대표 명언 ──
  function showFavoritePicker(ym, completedIdxs) {
    addFavPrompted(ym);
    const [year, month] = ym.split('-');
    const mnNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    const mnLabel = year + '년 ' + mnNames[parseInt(month) - 1];
    document.getElementById('fav-picker-modal')?.remove();
    const modal = document.createElement('div');
    modal.id = 'fav-picker-modal';
    modal.innerHTML = `
      <div class="fav-picker-overlay">
        <div class="fav-picker-box">
          <div class="fav-picker-header">
            <div class="fav-picker-title">⭐ ${mnLabel} 대표 명언</div>
            <div class="fav-picker-sub">${mnLabel}에 가장 마음에 든 명언을 골라 기록해보세요</div>
          </div>
          <div class="fav-picker-list">
            ${completedIdxs.map(idx => `
              <div class="fav-picker-item" data-idx="${idx}">
                <div class="fav-picker-quote">${quotes[idx].text}</div>
                <div class="fav-picker-author">— ${quotes[idx].author}</div>
              </div>`).join('')}
          </div>
          <div class="fav-picker-actions">
            <button class="fav-picker-skip" id="fav-skip">나중에 선택</button>
          </div>
        </div>
      </div>`;
    document.body.appendChild(modal);
    modal.querySelectorAll('.fav-picker-item').forEach(item => {
      item.addEventListener('click', () => {
        const idx = parseInt(item.dataset.idx);
        monthlyFav[ym] = { idx };
        saveMonthlyFav(monthlyFav);
        modal.remove();
        showFavToast(mnLabel);
        if (document.getElementById('tab-calendar').classList.contains('active')) renderCalendar();
      });
    });
    document.getElementById('fav-skip').addEventListener('click', () => modal.remove());
  }

  function showFavToast(mnLabel) {
    const toast = document.createElement('div');
    toast.className = 'fav-toast';
    toast.textContent = `⭐ ${mnLabel} 대표 명언으로 저장되었어요`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2800);
  }

  function checkNewMonthFavorite() {
    const currentYM = getYM();
    const prompted  = getFavPrompted();
    const pendingSet = new Set();
    Object.values(doneMap).forEach(v => {
      if (!v) return;
      DIFFS.forEach(d => {
        if (v[d.key] && v[d.key].date) {
          const ym = v[d.key].date.slice(0, 7);
          if (ym !== currentYM && !monthlyFav[ym] && !prompted.includes(ym)) pendingSet.add(ym);
        }
      });
    });
    if (!pendingSet.size) return;
    const ym = [...pendingSet].sort().pop(); // 가장 최근 달
    const completed = getCompletedForMonth(ym);
    if (completed.length > 0) setTimeout(() => showFavoritePicker(ym, completed), 800);
  }

  function checkLastDayFavorite() {
    const n = new Date();
    if (n.getDate() !== new Date(n.getFullYear(), n.getMonth() + 1, 0).getDate()) return;
    const ym = getYM();
    if (monthlyFav[ym]) return;
    const completed = getCompletedForMonth(ym);
    if (completed.length > 0) showFavoritePicker(ym, completed);
  }

  // ── 초기 실행 ──
  show(current, false);
  checkNewMonthFavorite();
  // updateNavState는 show() 내부에서 호출됨
  </script>
</body>
</html>
